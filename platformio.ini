; PlatformIO Project Configuration File
;
; CYD-WiFi-Meter / Scanner
; Hardware: ESP32-2432S028R (Cheap Yellow Display)
;
; Build/Flash/Monitor:
;   pio run              - kompilieren
;   pio run -t upload    - flashen
;   pio device monitor   - Serial-Monitor (115200 baud)

[platformio]
; Beide CYD-Display-Varianten werden standardmäßig gebaut, damit docs/
; (Web-Installer) immer mit beiden merged.bin-Dateien synchron bleibt.
; Benannt nach dem Display-Controller (ILI9341/ST7789), NICHT nach der
; USB-Portanzahl — Letztere sagt nicht zuverlässig aus, welcher Controller
; verbaut ist (siehe README.md "Welche Firmware passt zu meinem Display?").
default_envs = esp32dev, cyd-st7789

; ----------------------------------------------------------------------------
; Hauptumgebung: ESP32 Dev Module (kompatibel mit CYD / ESP32-WROOM-32)
; ILI9341-Variante (v1/v2/v3-Hardware-Revision) — siehe include/User_Setup.h
; ----------------------------------------------------------------------------
[env:esp32dev]
platform        = espressif32 @ ~6.5.0
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 921600

; Standard-Partitionstabellen-Layout: 1.2 MB App, 1.5 MB SPIFFS.
; (Schluesselwort "default" wird von esp32dev nicht erkannt — expliziter Dateiname noetig.)
board_build.partitions = default.csv
board_build.f_flash    = 80000000L
board_build.flash_mode = dio

; Arduino-Core: höhere Minor-Version = WPA3-Unterstützung in WiFi-Scan
platform_packages =
    framework-arduinoespressif32 @ ~3.20017.0

; ---- Bibliotheken ----------------------------------------------------------
;
; Hinweis XPT2046_Touchscreen:
;   Im PlatformIO-Registry ist nur eine uralte Pre-Release-Version
;   (0.0.0-alpha+sha.26b691b2c8) verfügbar, die nicht zur aktuellen API
;   (tirqTouched(), touched(), getPoint(), begin(SPIClass&), setRotation())
;   passt. Deshalb beziehen wir die Lib als Tarball vom Tag v1.4 — das
;   umgeht zudem die Xcode-Lizenzabfrage, die PIOs Git-Klon triggert.
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    https://github.com/PaulStoffregen/XPT2046_Touchscreen/archive/refs/tags/v1.4.tar.gz

; ---- Build-Flags -----------------------------------------------------------
;
; -include $PROJECT_DIR/include/User_Setup.h sorgt dafür, dass TFT_eSPI
; UNSERE User_Setup.h aus include/ nimmt, statt der Default-Datei in der Lib.
; USER_SETUP_LOADED wird DORT definiert (darum hier NICHT erneut setzen,
; sonst gibt es ein "redefined"-Warning).
;
; CYD-Marker: kann später zur Featureauswahl genutzt werden.
build_flags =
    -DCYD
    -include $PROJECT_DIR/include/User_Setup.h
    -DCORE_DEBUG_LEVEL=3
    -Wno-unused-variable
    -Wno-unused-but-set-variable

; ---- Upload-Optionen -------------------------------------------------------
upload_port    =
upload_protocol = esptool

; ---- Web-Installer-Image ----------------------------------------------------
; Erzeugt nach jedem Build ein zusammengeführtes Flash-Image in docs/
; (CYD-WiFi-Meter-ili9341-merged.bin) — wird vom Browser-Web-Installer
; (docs/index.html, ESP Web Tools) verwendet. Siehe merge_bin.py.
extra_scripts = post:merge_bin.py

; ----------------------------------------------------------------------------
; ST7789-Variante: einige CYD-Board-Chargen verbauen diesen Controller statt
; ILI9341 (u.a. bei manchen 2-USB-Boards beobachtet, aber NICHT zuverlässig
; an der USB-Portanzahl erkennbar — siehe README.md). Gleiche Codebasis wie
; env:esp32dev — nur der TFT-Treiber/Farbkonfiguration in
; include/User_Setup.h unterscheidet sich, gesteuert über -DCYD_ST7789.
; ----------------------------------------------------------------------------
[env:cyd-st7789]
extends     = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DCYD_ST7789

; ----------------------------------------------------------------------------
; Optional: Debug-Build mit mehr Logging
; ----------------------------------------------------------------------------
[env:esp32dev-debug]
extends        = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DCORE_DEBUG_LEVEL=5
    -DDEBUG_ESP_PORT=Serial